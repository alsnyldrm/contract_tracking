services:
  contract-tracking:
    build: .
    container_name: contract_tracking_app
    env_file:
      - .env
    ports:
      - "8087:80"
    restart: unless-stopped
    volumes:
      - uploaded_contract_documents:/app/data/documents
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  uploaded_contract_documents:
  logs:
